services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-postgres}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - db_data:/var/lib/postgresql/data          # data persists across restarts
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql  # auto-runs on first start
      - ./backend/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql      # auto-loads data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app_network

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DB_HOST:     db
      DB_PORT:     5432
      DB_NAME:     ${DB_NAME:-postgres}
      DB_USER:     ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      LOG_LEVEL:   ${LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy   # waits until postgres is actually ready
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # ── nginx Frontend ──────────────────────────────────────────────────────────
  frontend:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"         # open http://localhost in browser
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - app_network

volumes:
  db_data:   # named volume — survives container restarts and rebuilds

networks:
  app_network:
    driver: bridge
