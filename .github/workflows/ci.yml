name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       postgres
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Create DB schema
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -f backend/schema.sql

      - name: Run tests
        working-directory: backend
        env:
          DB_HOST:     localhost
          DB_PORT:     5432
          DB_NAME:     postgres
          DB_USER:     postgres
          DB_PASSWORD: postgres
        run: pytest tests/ -v --tb=short

  docker-build:
    name: Verify Docker build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build ./backend -t loan-api:test

      - name: Verify image starts
        run: |
          docker run -d --name test-api \
            -e DB_HOST=localhost \
            -e DB_PASSWORD=postgres \
            loan-api:test
          sleep 3
          docker logs test-api
          docker rm -f test-api
